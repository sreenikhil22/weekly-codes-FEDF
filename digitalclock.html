<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2> Digital Clock</h2>

        <div id="clock-container">
            <span id="hour">00</span> :
            <span id="min">00</span> :
            <span id="sec">00</span>
        </div>

        <hr>

        <button onclick="useDOM()">Standard DOM</button>
        <button onclick="useVDOM()">Virtual DOM</button>

        <p id="status">Click a button to start</p>
    </div>

    <script src="script.js"></script>
</body>
</html>

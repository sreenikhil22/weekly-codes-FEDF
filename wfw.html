<html>
<head>
  <title>Without Framework Example</title>
</head>
<body>
<h1>User Profile</h1>
<p id="name">Name: John</p>
<p id="age">Age: 25</p>

<button onclick="updateUser()">Update User</button>

<script>
function updateUser() {
  // Manually updating each DOM element 
  document.getElementById("name").innerText = "Name: David";
  document.getElementById("age").innerText = "Age: 30";
}
</script>
</body>
</html>
